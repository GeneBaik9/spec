# 3GPP RAN core specifications to download
# Release target — use "latest" for the most recent frozen version per spec,
# or pin a specific release (e.g., "Rel-18", "Rel-19").
release: latest

# Spec list — grouped by series and working group (WG) for clarity.
# Each entry uses the canonical 3GPP TS number (dots preserved).
specs:
  # ─────────── TS 36 series (LTE) ───────────
  ts_36:
    ran1_physical_layer:
      - "36.211"   # Physical channels and modulation
      - "36.212"   # Multiplexing and channel coding
      - "36.213"   # Physical layer procedures
      - "36.214"   # Physical layer measurements
    ran2_layer2_layer3:
      - "36.300"   # E-UTRA overall description; Stage 2
      - "36.304"   # UE procedures in idle mode
      - "36.306"   # UE radio access capabilities
      - "36.321"   # MAC protocol specification
      - "36.322"   # RLC protocol specification
      - "36.323"   # PDCP protocol specification
      - "36.331"   # RRC protocol specification
    ran4_radio_performance:
      - "36.101"   # UE radio transmission and reception
      - "36.104"   # BS radio transmission and reception
      - "36.133"   # Requirements for support of RRM

  # ─────────── TS 38 series (NR) ───────────
  ts_38:
    ran1_physical_layer:
      - "38.211"   # Physical channels and modulation
      - "38.212"   # Multiplexing and channel coding
      - "38.213"   # Physical layer procedures for control
      - "38.214"   # Physical layer procedures for data
      - "38.215"   # Physical layer measurements
    ran2_layer2_layer3:
      - "38.300"   # NR overall description; Stage 2
      - "38.304"   # UE procedures in idle/inactive mode
      - "38.306"   # UE radio access capabilities
      - "38.321"   # MAC protocol specification
      - "38.322"   # RLC protocol specification
      - "38.323"   # PDCP protocol specification
      - "38.331"   # RRC protocol specification
    ran3_architecture:
      - "38.401"   # NG-RAN architecture description
    ran4_radio_performance:
      - "38.101-1" # UE radio Tx/Rx Range 1 standalone
      - "38.101-2" # UE radio Tx/Rx Range 2 standalone
      - "38.101-3" # UE radio Tx/Rx Range 1 and Range 2 interworking with other radios
      - "38.101-4" # UE radio Tx/Rx performance requirements
      - "38.101-5" # UE radio Tx/Rx Range 2 standalone with shared spectrum
      - "38.104"   # BS radio transmission and reception
      - "38.133"   # Requirements for support of RRM
